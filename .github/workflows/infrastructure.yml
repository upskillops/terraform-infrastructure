name: Hello Infra Runner

on: 
  push

jobs:
   hello:
       runs-on: [ infra ]
       steps:
          - name: Print Dev Secret
            run:  |
                  secret="${{ secrets.DEV_CLIENT_ID }}"
                  echo "${secret:0:4}"
          - name: Print Prod Secret
            run:  |
                  secret="${{ secrets.PROD_CLIENT_ID }}"
                  echo "${secret:0:4}"

            
