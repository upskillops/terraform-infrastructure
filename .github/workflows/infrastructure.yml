name: Hello Infra Runner

on: 
  push

jobs:
   build-java:
     runs-on: [infra]
     steps:
        - name: Build Java Application
          run: echo "I am in build phase"
   
   build-python:
     runs-on: [infra]
     steps:
        - name: Build Pythn Application
          run: echo "I am in build phase"       

   test:
      runs-on: [infra]
      needs: [build-java,build-python]
      steps:
        - name: Test Job
          run: echo1 "Running Test Job"

   deploy:
      runs-on: [infra]
      needs: [build-java,build-python,test]
      steps:
        - name: Deploy Job
          run: echo "Running Deploy Job"

            
