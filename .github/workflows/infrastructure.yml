name: Hello Infra Runner

on: 
  push

jobs:
   build-java:
     runs-on: [infra]
     steps:
        - name: Build Java Application
          run: echo "I am in build phase" > app.txt
        - name: Upload the Artifact
          uses: actions/upload-artifact@v4
          with:
             name: app-file
             path: app.txt
   
   read-Code:
       runs-on: [infra]
       needs: [build-java]
       steps:
          - name: Download the File
            uses: actions/download-artifact@v4
            with:
               name: app-file
          - name: Read the File
            run: cat app.txt
     

            
